<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XER Schedule Comparator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>XER Schedule Comparator</h1>
        <p>Upload your Baseline and Updated Primavera P6 XER files to compare schedules and generate insights.</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="flash">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="form-group">
                <label for="baseline">Baseline Schedule (.xer)</label>
                <input type="file" name="baseline" id="baseline" accept=".xer" required>
            </div>
            <div class="form-group">
                <label for="updated">Updated Schedule (.xer)</label>
                <input type="file" name="updated" id="updated" accept=".xer" required>
            </div>
            <button type="submit" id="submitBtn">
                <span class="loader" id="loader"></span>
                <span id="btnText">Compare Schedules</span>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            var btn = document.getElementById('submitBtn');
            var loader = document.getElementById('loader');
            var btnText = document.getElementById('btnText');

            btn.disabled = true;
            loader.style.display = 'inline-block';
            btnText.innerText = 'Analyzing Schedules...';
        });
    </script>
</body>
</html>
